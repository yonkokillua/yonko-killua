<script src="script.js"></script>


<script>

function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (menu) {
        menu.classList.toggle("active");
        console.log("تم الضغط والقائمة مفترض تظهر الآن");
    } else {
        console.error("المشكلة: العنصر mobileMenu غير موجود في الصفحة");
    }
}

// بيانات مشروعك (صحيحة 100%)
const firebaseConfig = {
    apiKey: "AIzaSyBhawldRgwyHaIYcxGvm-Ajy3GjWIHnSsw",
    authDomain: "kahyaneen-chat.firebaseapp.com",
    databaseURL: "https://kahyaneen-chat-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kahyaneen-chat",
    storageBucket: "kahyaneen-chat.firebasestorage.app",
    messagingSenderId: "307232006173",
    appId: "1:307232006173:web:c552e336d2a9c3ec0866f4",
    measurementId: "G-ZPWVD24Q26"
};

// تشغيل فايربيس (تأكد إنه مش شغال قبل كدة)
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const database = firebase.database();
const chatRef = database.ref("messages");

// دالة الإرسال
function sendMessage() {
    const input = document.getElementById("messageInput");
    const fileInput = document.getElementById("fileInput");
    const chatBox = document.getElementById("chatBox");

    const text = input.value.trim();
    const file = fileInput.files[0];

    if (text === "" && !file) return;

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            chatRef.push({
                text: text,
                fileData: e.target.result,
                fileType: file.type
            });
        };
        reader.readAsDataURL(file);
    } else {
        chatRef.push({
            text: text,
            fileData: null,
            fileType: "none"
        });
    }

    input.value = "";
    fileInput.value = "";
}

// استقبال الرسائل
chatRef.on("child_added", (snapshot) => {
    const m = snapshot.val();
    createMessageUI(m.text, m.fileData, m.fileType, snapshot.key);
});

// بناء الواجهة
function createMessageUI(text, fileData, fileType, key) {
    const chatBox = document.getElementById("chatBox");
    if (!chatBox) return;

    const msg = document.createElement("div");
    msg.className = "message";
    msg.setAttribute("data-key", key);

    const content = document.createElement("div");
    content.className = "msg-content";

    const delBtn = document.createElement("button");
    delBtn.className = "delete-btn";
    delBtn.innerHTML = "❌";
    
    delBtn.onclick = function() {
        database.ref("messages/" + key).remove();
    };

    msg.appendChild(content);
    msg.appendChild(delBtn);

    if (text) {
        const p = document.createElement("p");
        p.textContent = text;
        msg.appendChild(p);
    }

    if (fileData) {
        if (fileType.includes("image")) {
            const img = document.createElement("img");
            img.src = fileData;
            content.appendChild(img);
        } else if (fileType.includes("video")) {
            const video = document.createElement("video");
            video.src = fileData;
            video.controls = true;
            content.appendChild(video);
        }
    }

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// مسح الرسالة
chatRef.on("child_removed", (snapshot) => {
    const key = snapshot.key;
    const msgNode = document.querySelector(`[data-key="${key}"]`);
    if (msgNode) msgNode.remove();
});
</script>

</body>
