<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="script.js"></script>


<script>

function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (menu) {
        menu.classList.toggle("active");
        console.log("تم الضغط والقائمة مفترض تظهر الآن");
    } else {
        console.error("المشكلة: العنصر mobileMenu غير موجود في الصفحة");
    }
}

// بيانات مشروعك (صحيحة 100%)
  const firebaseConfig = {
    apiKey: "AIzaSyAdqfd28EFbC084E-N-kluWszJOGzQJqCw",
    authDomain: "chat-63d37.firebaseapp.com",
    projectId: "chat-63d37",
    databaseURL: "https://chat-63d37-default-rtdb.firebaseio.com", // ضيف السطر ده وتأكد إنه صح من الفايربيس
    storageBucket: "chat-63d37.firebasestorage.app",
    messagingSenderId: "1032264762672",
    appId: "1:1032264762672:web:78e55ff2fb296c826ef4f5",
    measurementId: "G-E4F39EKBNF"
  };

// تشغيل فايربيس
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const database = firebase.database();
const chatRef = database.ref("messages");

// إعدادات كلاوديناري (دي اللي هتخليك ترفع فيديوهات كبيرة في صفحتك)
// بيانات كلاوديناري الخاصة بك (تم التعديل ببياناتك)
const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/djnlusqyu/upload';
const CLOUDINARY_UPLOAD_PRESET = 'ijkvduvm'; 

function sendMessage() {
    const input = document.getElementById("messageInput");
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const text = input.value.trim();

    if (!text && !file) return;

    if (file) {
        console.log("جاري الرفع...");
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        // السطر ده مهم عشان كلاوديناري يعرف إنه فيديو أو صورة تلقائياً
        formData.append('resource_type', 'auto'); 

        fetch(CLOUDINARY_URL, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.secure_url) {
                chatRef.push({
                    text: text,
                    fileData: data.secure_url, 
                    fileType: file.type, // ده بيبعت image/png أو video/mp4
                    timestamp: Date.now()
                });
            }
        })
        .catch(err => alert("خطأ في الرفع، جرب فيديو أصغر"));
    } else {
        chatRef.push({ text: text, fileData: null, fileType: "none" });
    }
    input.value = "";
    fileInput.value = "";
}

function createMessageUI(text, fileData, fileType, key) {
    const chatBox = document.getElementById("chatBox");
    if (!chatBox) return;

    const msg = document.createElement("div");
    msg.className = "message";
    msg.setAttribute("data-key", key);

    // 1. هنعمل صندوق "المحتوى" اللي هيشيل (النص والميديا) مع بعض
    const contentSide = document.createElement("div");
    contentSide.className = "content-side";

    // 2. النص
    if (text) {
        const p = document.createElement("p");
        p.textContent = text;
        contentSide.appendChild(p);
    }

    // 3. الميديا (صور أو فيديو)
    if (fileData) {
        let mediaTag;
        if (fileType && fileType.includes("video")) {
            mediaTag = document.createElement("video");
            mediaTag.controls = true;
        } else {
            mediaTag = document.createElement("img");
        }
        mediaTag.src = fileData;
        contentSide.appendChild(mediaTag);
    }

    // 4. زر الحذف (لوحده)
    const delBtn = document.createElement("button");
    delBtn.className = "delete-btn";
    delBtn.innerHTML = "❌";
    delBtn.onclick = () => database.ref("messages/" + key).remove();

// الترتيب الصحيح للـ RTL:
    // بنضيف المحتوى أولاً عشان ياخد أقصى اليمين
    msg.appendChild(contentSide); 
    
    // بنضيف الزرار ثانياً عشان يروح أقصى الشمال
    msg.appendChild(delBtn);

    
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}
// 1. استماع للرسايل الجديدة (عشان تظهر فوراً)
chatRef.on("child_added", (snapshot) => {
    const m = snapshot.val();
    // بنادي الدالة اللي إنت عاملها عشان ترسم الرسالة
    createMessageUI(m.text, m.fileData, m.fileType, snapshot.key);
});

// 2. الاستماع لو رسالة اتمسحت (عشان تختفي من الشاشة)
chatRef.on("child_removed", (snapshot) => {
    const key = snapshot.key;
    const msgNode = document.querySelector(`[data-key="${key}"]`);
    if (msgNode) msgNode.remove();
});
</script>

</body>
