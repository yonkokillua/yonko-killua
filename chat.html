<!-- AOS INIT -->
<script>

function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (menu) {
        menu.classList.toggle("active");
        console.log("تم الضغط والقائمة مفترض تظهر الآن");
    } else {
        console.error("المشكلة: العنصر mobileMenu غير موجود في الصفحة");
    }
}

document.addEventListener("DOMContentLoaded", loadChat);

document.addEventListener("DOMContentLoaded", loadChat);

document.addEventListener("DOMContentLoaded", loadChat);

// 1. أول ما الصفحة تفتح.. حمل البيانات
window.onload = function() {
    console.log("الصفحة حملت.. جاري استرجاع الشات");
    loadChat();
};

// 1. إعداد قاعدة البيانات العملاقة (IndexedDB)
let db;
const request = indexedDB.open("KahyaneenDB", 1);

request.onupgradeneeded = (e) => {
    db = e.target.result;
    db.createObjectStore("chat", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = (e) => {
    db = e.target.result;
    loadChat(); // تحميل الشات أول ما القاعدة تجهز
};

function sendMessage() {
    const input = document.getElementById("messageInput");
    const fileInput = document.getElementById("fileInput");
    const text = input.value.trim();
    const file = fileInput.files[0];

    if (text === "" && !file) return;

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            createMessageUI(text, e.target.result, file.type);
            saveChat();
        };
        reader.readAsDataURL(file);
    } else {
        createMessageUI(text, null, null);
        saveChat();
    }

    input.value = "";
    fileInput.value = "";
}

function createMessageUI(text, fileData, fileType) {
    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.className = "message";

    const content = document.createElement("div");
    content.className = "msg-content";

    const delBtn = document.createElement("button");
    delBtn.className = "delete-btn";
    delBtn.innerHTML = "❌";
    
    delBtn.onclick = function() {
        msg.remove();
        saveChat();
    };

    msg.appendChild(content);
    msg.appendChild(delBtn);

    if (text) {
        const p = document.createElement("p");
        p.textContent = text;
        msg.appendChild(p);
    }

    if (fileData) {
        if (fileType.includes("image")) {
            const img = document.createElement("img");
            img.src = fileData;
            content.appendChild(img);
        } else if (fileType.includes("video")) {
            const video = document.createElement("video");
            video.src = fileData;
            video.controls = true;
            content.appendChild(video);
        }
    }

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// 2. دالة الحفظ الجديدة (بتشيل أحجام كبيرة)
function saveChat() {
    if (!db) return;
    const allMsgs = [];
    document.querySelectorAll(".message").forEach(msg => {
        const p = msg.querySelector("p");
        const img = msg.querySelector("img");
        const video = msg.querySelector("video");

        allMsgs.push({
            text: p ? p.innerText : "",
            fileData: img ? img.src : (video ? video.src : null),
            fileType: img ? "image" : (video ? "video" : "none")
        });
    });

    const transaction = db.transaction("chat", "readwrite");
    const store = transaction.objectStore("chat");
    
    // بنمسح القديم ونحط الجديد كله
    store.clear().onsuccess = () => {
        store.add({ id: "currentChat", data: allMsgs });
        console.log("✅ تم الحفظ في المخزن العملاق");
    };
}

// 3. دالة التحميل
function loadChat() {
    if (!db) return;
    const transaction = db.transaction("chat", "readonly");
    const store = transaction.objectStore("chat");
    const getReq = store.get("currentChat");

    getReq.onsuccess = () => {
        if (getReq.result) {
            const messages = getReq.result.data;
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = ""; 
            messages.forEach(m => {
                createMessageUI(m.text, m.fileData, m.fileType);
            });
        }
    };
}
</script>
