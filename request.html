<html lang="ar">
<head>

<title>Yonko Killua</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<!-- Particles -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>

    <!-- BACKGROUND EFFECTS -->
    <div id="particles-js"></div>

<!-- NAV -->
<nav>
    <h2 class="logo">⚡ Yonko Killua</h2>

    

    <div class="menu-toggle" id="menu-toggle" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</nav>
    <ul class="desktop-links">
        <li><a href="request.html">Request To Play</a></li>
        <li><a href="chat.html">Chat</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>

    <div class="mobile-menu" id="mobileMenu">
        <a href="request.html">Request To Play</a>
        <a href="chat.html">Chat</a>
        <a href="#contact">Contact</a>
    </div>


    <div class="request-container">

    <input type="text" id="gameInput" placeholder="اكتب اسم اللعبة">
    <button onclick="addGame()">Add</button>
    

    <div class="boxes">

        <div class="box">
            <h3>Request To Play</h3>
            <div id="requestList"></div>
        </div>

        <div class="box">
            <h3>Finished</h3>
            <div id="finishedList"></div>
        </div>

    </div>

</div>




<footer>
    © 2026 Yonko Killua | Gaming Hub
</footer>

<script src="script.js"></script>

<!-- AOS INIT -->
<script>
   
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (menu) {
        menu.classList.toggle("active");
        console.log("تم الضغط والقائمة مفترض تظهر الآن");
    } else {
        console.error("المشكلة: العنصر mobileMenu غير موجود في الصفحة");
    }
}

// دالة الحفظ التلقائي
function saveData() {
    try {
        const requestItems = [];
        const finishedItems = [];

        document.querySelectorAll("#requestList .item span").forEach(el => {
            requestItems.push(el.innerText.trim());
        });

        document.querySelectorAll("#finishedList .item span").forEach(el => {
            finishedItems.push(el.innerText.trim());
        });

        localStorage.setItem("requestGames", JSON.stringify(requestItems));
        localStorage.setItem("finishedGames", JSON.stringify(finishedItems));
        console.log("✅ تم الحفظ في الذاكرة");
    } catch (e) {
        console.error("خطأ أثناء الحفظ:", e);
    }
}

// دالة التحميل
function loadData() {
    try {
        const req = JSON.parse(localStorage.getItem("requestGames")) || [];
        const fin = JSON.parse(localStorage.getItem("finishedGames")) || [];

        document.getElementById("requestList").innerHTML = "";
        document.getElementById("finishedList").innerHTML = "";

        req.forEach(name => createItem(name, "requestList"));
        fin.forEach(name => createItem(name, "finishedList"));
        console.log("📥 تم استرجاع البيانات");
    } catch (e) {
        console.log("الذاكرة فارغة حالياً");
    }
}

// تعديل بسيط لدالة الإضافة عشان تحفظ
function addGame() {
    const input = document.getElementById("gameInput");
    if (!input || input.value.trim() === "") return;

    createItem(input.value.trim(), "requestList");
    input.value = "";
    saveData(); // حفظ فوراً
}

function createItem(name, targetId) {
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
        <span>${name}</span>
        <div class="actions">
            ${targetId === "requestList" ? '<button onclick="moveToFinished(this)">✔</button>' : ''}
            <button onclick="deleteItem(this)">❌</button>
        </div>
    `;
    document.getElementById(targetId).appendChild(item);
}

function moveToFinished(btn) {
    const item = btn.closest(".item");
    btn.remove();
    document.getElementById("finishedList").appendChild(item);
    saveData();
}

function deleteItem(btn) {
    btn.closest(".item").remove();
    saveData();
}

// تشغيل التحميل أول ما الصفحة تفتح
window.onload = loadData;
</script>
</body>
</html>
