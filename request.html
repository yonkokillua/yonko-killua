<script>
   
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (menu) {
        menu.classList.toggle("active");
        console.log("تم الضغط والقائمة مفترض تظهر الآن");

}

const firebaseConfig = {
    apiKey: "AIzaSyAdqfd28EFbC084E-N-kluWszJOGzQJqCw",
    authDomain: "chat-63d37.firebaseapp.com",
    databaseURL: "https://chat-63d37-default-rtdb.firebaseio.com",
    projectId: "chat-63d37",
    storageBucket: "chat-63d37.firebasestorage.app",
    messagingSenderId: "1032264762672",
    appId: "1:1032264762672:web:78e55ff2fb296c826ef4f5"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();


// 1. المرجع في قاعدة البيانات (هنعمل فرعين: واحد للطلبات وواحد للمنتهي)
const requestRef = database.ref("games/requests");
const finishedRef = database.ref("games/finished");

// --- دالة الإضافة (الارسال للفايربيس) ---
function addGame() {
    const input = document.getElementById("gameInput");
    if (!input || input.value.trim() === "") return;

    // بنبعت الاسم للفايربيس
    requestRef.push({
        name: input.value.trim()
    });

    input.value = "";
}

// --- الاستماع للبيانات (عرض البيانات للكل) ---

// للطلبات الجديدة
requestRef.on("child_added", (snapshot) => {
    createItemUI(snapshot.val().name, "requestList", snapshot.key);
});

// للالعاب المنتهية
finishedRef.on("child_added", (snapshot) => {
    createItemUI(snapshot.val().name, "finishedList", snapshot.key);
});

// للاستماع عند الحذف (عشان تتمسح من عند الكل)
database.ref("games").on("child_removed", (snapshot) => {
    // كود الحذف من الواجهة (لو حذفت فرع كامل)
});

// دالة بناء الواجهة
function createItemUI(name, targetId, key) {
    const item = document.createElement("div");
    item.className = "item";
    item.setAttribute("data-key", key); // مهم جداً عشان نعرف نحذفها
    
    item.innerHTML = `
        <span>${name}</span>
        <div class="actions">
            ${targetId === "requestList" ? `<button onclick="moveToFinished('${key}', '${name}')">✔</button>` : ''}
            <button onclick="deleteItem('${key}', '${targetId}')">❌</button>
        </div>
    `;
    document.getElementById(targetId).appendChild(item);
}

// --- دالة النقل (من طلبات إلى منتهي) ---
function moveToFinished(key, name) {
    // 1. نمسحها من الطلبات
    requestRef.child(key).remove();
    // 2. نضيفها في المنتهي
    finishedRef.push({ name: name });
    
    // هنمسحها من الواجهة يدوياً برضه لضمان السرعة
    document.querySelector(`[data-key="${key}"]`).remove();
}

// --- دالة الحذف النهائي ---
function deleteItem(key, targetId) {
    const ref = (targetId === "requestList") ? requestRef : finishedRef;
    ref.child(key).remove();
    
    // مسح من الواجهة
    const el = document.querySelector(`[data-key="${key}"]`);
    if(el) el.remove();
}

// استماع للحذف من السيرفر (عشان لو مبرمج تاني مسحها تختفي عندك)
requestRef.on("child_removed", (snapshot) => {
    const el = document.querySelector(`[data-key="${snapshot.key}"]`);
    if(el) el.remove();
});

finishedRef.on("child_removed", (snapshot) => {
    const el = document.querySelector(`[data-key="${snapshot.key}"]`);
    if(el) el.remove();
});
</script>
