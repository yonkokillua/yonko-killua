<body>

    <div class="request-container">

    <input type="text" id="gameInput" placeholder="اكتب اسم اللعبة">
    <button onclick="addGame()">Add</button>
    <button onclick="saveData()">Confirm</button>

    <div class="boxes">

        <div class="box">
            <h3>Request To Play</h3>
            <div id="requestList"></div>
        </div>

        <div class="box">
            <h3>Finished</h3>
            <div id="finishedList"></div>
        </div>

    </div>

</div>




<footer>
    © 2026 Yonko Killua | Gaming Hub
</footer>

<script src="script.js"></script>

<!-- AOS INIT -->
<script>
    AOS.init({
    duration: 900,
    once: true
});
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (menu) {
        menu.classList.toggle("active");
        console.log("تم الضغط والقائمة مفترض تظهر الآن");
    } else {
        console.error("المشكلة: العنصر mobileMenu غير موجود في الصفحة");
    }
}

// 1. عند تحميل الصفحة: شغل التحميل فوراً
document.addEventListener("DOMContentLoaded", function() {
    loadData();

    // ربط زر الـ Enter بالأنبوت
    const input = document.getElementById("gameInput");
    if (input) {
        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                addGame();
            }
        });
    }
});

// 2. دالة الإضافة
function addGame() {
    const input = document.getElementById("gameInput");
    const requestList = document.getElementById("requestList");

    if (!input || !requestList) return;

    const value = input.value.trim();
    if (value === "") return;

    createItem(value, "requestList");
    input.value = "";
    saveData(); // حفظ بعد الإضافة
}

// 3. دالة الإنشاء (المسؤولة عن شكل العنصر)
function createItem(name, targetId) {
    const item = document.createElement("div");
    item.className = "item";

    item.innerHTML = `
        <span>${name}</span>
        <div class="actions">
            ${targetId === "requestList" 
                ? `<button onclick="moveToFinished(this)" style="background:#28a745;">✔</button>` 
                : ''
            }
            <button onclick="deleteItem(this)" style="background:transparent; border:1px solid #ff0033; color:#ff0033;">❌</button>
        </div>
    `;

    document.getElementById(targetId).appendChild(item);
}

// 4. دالة النقل
function moveToFinished(btn) {
    const item = btn.closest(".item");
    const finishedList = document.getElementById("finishedList");

    if (item && finishedList) {
        btn.remove(); // حذف زرار الصح
        finishedList.appendChild(item);
        saveData(); // حفظ بعد النقل
    }
}

// 5. دالة الحذف
function deleteItem(btn) {
    const item = btn.closest(".item");
    if (item) {
        item.remove();
        saveData(); // حفظ بعد الحذف
    }
}

// 6. 🔥 دالة الحفظ (تجمع الأسماء وتحولها لنص JSON)
function saveData() {
    const requestItems = [];
    const finishedItems = [];

    document.querySelectorAll("#requestList .item span").forEach(el => {
        requestItems.push(el.innerText);
    });

    document.querySelectorAll("#finishedList .item span").forEach(el => {
        finishedItems.push(el.innerText);
    });

    localStorage.setItem("requestGames", JSON.stringify(requestItems));
    localStorage.setItem("finishedGames", JSON.stringify(finishedItems));
}

// 7. 🔥 دالة التحميل (بتقرأ البيانات من ذاكرة المتصفح)
function loadData() {
    // تنظيف القوائم أولاً عشان ميكررش البيانات
    document.getElementById("requestList").innerHTML = "";
    document.getElementById("finishedList").innerHTML = "";

    const request = JSON.parse(localStorage.getItem("requestGames")) || [];
    const finished = JSON.parse(localStorage.getItem("finishedGames")) || [];

    request.forEach(name => createItem(name, "requestList"));
    finished.forEach(name => createItem(name, "finishedList"));
}
</script>
</body>
</html>
