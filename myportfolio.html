<!-- AOS INIT -->
<script>

function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (menu) {
        menu.classList.toggle("active");
        console.log("تم الضغط والقائمة مفترض تظهر الآن");
    } else {
        console.error("المشكلة: العنصر mobileMenu غير موجود في الصفحة");
    }
}




function toggleGallery(btn) {
    const gallery = btn.nextElementSibling;
    
    if (gallery.style.display === "none" || gallery.style.display === "") {
        gallery.style.display = "flex"; // لازم flex عشان الصور تترص بالعرض
        btn.innerText = "Less";
    } else {
        gallery.style.display = "none";
        btn.innerText = "More";
    }
}
// دالة تكبير الصورة
function openImage(img) {
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    
    lightboxImg.src = img.src; // بياخد مسار الصورة اللي ضغطت عليها
    lightbox.style.display = "flex"; // بيظهر الـ lightbox
}

// دالة إغلاق الصورة عند الضغط في أي مكان
function closeImage() {
    document.getElementById("lightbox").style.display = "none";
}
// بيخلي بكرة الماوس تقلب الصور بالعرض
document.querySelectorAll('.gallery').forEach(el => {
    el.addEventListener('wheel', (e) => {
        if (e.deltaY != 0) {
            e.preventDefault();
            el.scrollLeft += e.deltaY;
        }
    });
});
</script>
